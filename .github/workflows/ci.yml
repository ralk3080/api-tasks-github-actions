name: Continuos Integration

on: 
    push:
        branches: ["main"]
            

permissions:
    id-token: write
    contents: read
            
env:
    DOTNET_VERSION: '10.0.103'
    BUILD_CONFIGURATION: 'Release'

jobs:
    build:
        name: "CI"
        runs-on: ubuntu-latest

        steps:
          
            - name: Checkout Repository
              uses: actions/checkout@v2

            - name: Setup .NET
              uses: actions/setup-dotnet@v1
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }} 

            - name: Test with dotnet
              run: dotnet test --configuration ${{ env.BUILD_CONFIGURATION }}

            - name: Publish with dotnet
              run: dotnet publish src/TaskApi/TaskApi.csproj --configuration ${{ env.BUILD_CONFIGURATION }} -o artifacts

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: uv-artifact
                  path: artifacts/

    deploy:
        name: "Deploy Dev"
        runs-on: ubuntu-latest
        needs: build
        environment: dev

        steps:
            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                  name: uv-artifact
                  path: artifacts/

            - name: Azure Login
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}      
            
            - name: Deploy to Azure Web App
              uses: azure/webapps-deploy@v2
              with: 
                  app-name: app-api-net-uv-dev
                  package: artifacts/
      
    deploy_prod:
      name: "Deploy Prod"
      runs-on: ubuntu-latest
      needs: deploy
      environment: prod

      steps:
          - name: Download artifact
            uses: actions/download-artifact@v4
            with:
                name: uv-artifact
                path: artifacts/

          - name: Azure Login
            uses: azure/login@v2
            with:
                client-id: ${{ secrets.AZURE_CLIENT_ID }}
                tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}      
          
          - name: Deploy to Azure Web App
            uses: azure/webapps-deploy@v2
            with: 
                app-name: app-api-net-uv-dev
                package: artifacts/            